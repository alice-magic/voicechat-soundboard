name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # 26.1.x targets need Java 25; older 1.21.x targets compile happily on 21.
      # Setup-java@v4 supports installing multiple JDKs; the last one becomes JAVA_HOME.
      - name: Setup JDKs (21 + 25)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all Stonecutter versions
        run: ./gradlew chiseledBuild --stacktrace

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: soundboard-builds
          path: |
            build/libs/**/*.jar
            vc-simple/build/libs/**/*.jar
            vc-plasmo/build/libs/**/*.jar
            kowoui/build/libs/**/*.jar
          if-no-files-found: warn
