# See https://stonecutter.kikugie.dev/wiki/config/properties#centralized-properties
mod.id = "soundboard"
mod.name = "Soundboard Core"
mod.group = "dev.kikugie"
mod.version = "0.7.1"

mod.kowoui.id = "kowoui"
mod.kowoui.name = "Kotlin OwO UI"
mod.kowoui.version = "0.3.0"

# Shared dependency versions (loader is the same across all targets we ship)
deps.fabric_loader = "0.19.2"
deps.fabric_language_kotlin = "1.13.11+kotlin.2.3.21"
deps.flk_dep = ">=0.13"

# Build tooling
loomx.loom_version = "1.16-SNAPSHOT"

# Common library versions (modmenu is per-version below)
deps.okhttp = "4.12.0"
deps.okio = "3.9.1"
deps.svc_api = "2.6.13"
deps.plasmo_api = "2.1.7-SNAPSHOT"
deps.plasmo_config = "1.0.2"

# Publishing channel (stable / beta / alpha)
release = "stable"

# ---------- Per-version overrides ----------

["1.21.8"]
mod.mc_compat = "1.21.8"
mod.mc_releases = ["1.21.8"]

deps.fabric_api = "0.136.1+1.21.8"
deps.yarn_mappings = "1.21.8+build.1"
deps.owo_lib = "0.12.23+1.21.8"
deps.owo_dep = "~0.12"
deps.svc_mod = "fabric-1.21.8-2.6.17"
deps.plasmo_mod = "fabric-1.21.6-2.1.9"
deps.modmenu = "15.0.2"

["1.21.11"]
mod.mc_compat = "1.21.11"
mod.mc_releases = ["1.21.11"]

deps.fabric_api = "0.141.3+1.21.11"
deps.yarn_mappings = "1.21.11+build.5"
deps.owo_lib = "0.13.0+1.21.11"
deps.owo_dep = "~0.13"
deps.svc_mod = "fabric-1.21.11-2.6.17"
deps.plasmo_mod = "fabric-1.21.11-2.1.9"
deps.modmenu = "17.0.0"

["26.1"]
mod.mc_compat = "~26.1"
mod.mc_releases = ["26.1", "26.1.1", "26.1.2"]

deps.fabric_api = "0.148.0+26.1.2"
# 26.1+ uses Mojang Mappings; loomx.applyMojangMappings() handles this in build.gradle.kts
deps.yarn_mappings = ""
deps.owo_lib = "0.13.0+26.1"
deps.owo_dep = "~0.13"
deps.svc_mod = "fabric-2.6.17+26.1.2"
deps.plasmo_mod = "fabric-26.1-2.1.9"
deps.modmenu = "18.0.0-beta.1"
